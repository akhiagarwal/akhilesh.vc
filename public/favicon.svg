<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Orbital ring 1 — Life (dark emerald) -->
  <ellipse cx="32" cy="32" rx="28" ry="11" transform="rotate(-30 32 32)"
    stroke="#047857" stroke-width="2.5" fill="none"/>
  <!-- Orbital ring 2 — Energy (dark amber) -->
  <ellipse cx="32" cy="32" rx="26" ry="10" transform="rotate(30 32 32)"
    stroke="#b45309" stroke-width="2.5" fill="none"/>
  <!-- Orbital ring 3 — Motion (dark cyan) -->
  <ellipse cx="32" cy="32" rx="24" ry="12" transform="rotate(85 32 32)"
    stroke="#0369a1" stroke-width="2.5" fill="none"/>
  <!-- Centre nucleus — Matter/Intelligence (deep purple) -->
  <circle cx="32" cy="32" r="7" fill="#7c3aed"/>
  <circle cx="32" cy="32" r="3.5" fill="#e9d5ff"/>
</svg>
