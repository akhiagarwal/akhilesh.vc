<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepTech Wheel - Fallback Version</title>
  <style>
    /* ============================================
       DEEPTECH WHEEL - Pure HTML/CSS Fallback
       ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    /* CSS Variables */
    :root {
      --wheel-size: min(600px, 80vw);
      --sphere-size: calc(var(--wheel-size) * 0.22);
      --glow-purple: rgba(168, 85, 247, 0.6);
      --glow-pink: rgba(236, 72, 153, 0.4);
      --glow-blue: rgba(99, 102, 241, 0.5);
      --bg-dark: #050505;
    }

    /* Container */
    .deeptech-wheel-container {
      position: relative;
      width: var(--wheel-size);
      height: var(--wheel-size);
      perspective: 1200px;
    }

    /* Starfield */
    .starfield {
      position: absolute;
      inset: -20%;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: starTwinkle 3s ease-in-out infinite;
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* Wheel Wrapper */
    .deeptech-wheel-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: wheelSway 8s ease-in-out infinite;
    }

    @keyframes wheelSway {
      0%, 100% { transform: rotateX(8deg) rotateY(-3deg); }
      25% { transform: rotateX(10deg) rotateY(2deg); }
      50% { transform: rotateX(6deg) rotateY(4deg); }
      75% { transform: rotateX(9deg) rotateY(-2deg); }
    }

    /* Outer Glow */
    .wheel-outer-glow {
      position: absolute;
      inset: -15%;
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 50%,
        var(--glow-purple) 0%,
        var(--glow-blue) 30%,
        transparent 70%
      );
      filter: blur(60px);
      opacity: 0.6;
      z-index: -2;
      animation: glowPulse 6s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* Edge Feather */
    .wheel-edge-feather {
      position: absolute;
      inset: -5%;
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 50%,
        transparent 40%,
        rgba(5, 5, 5, 0.3) 55%,
        rgba(5, 5, 5, 0.6) 65%,
        rgba(5, 5, 5, 0.85) 75%,
        var(--bg-dark) 90%
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Main Wheel */
    .deeptech-wheel {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05),
        inset 0 0 100px rgba(0, 0, 0, 0.5),
        0 30px 60px -20px rgba(0, 0, 0, 0.8);
    }

    /* Sectors */
    .wheel-sector {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .sector-image-wrapper img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7) saturate(1.3);
    }

    /* Sector clip-paths for 5 sections */
    .sector-1 { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 30.9%, 79.4% 50%); }
    .sector-2 { clip-path: polygon(50% 50%, 79.4% 50%, 100% 30.9%, 100% 100%, 69.1% 100%, 50% 79.4%); }
    .sector-3 { clip-path: polygon(50% 50%, 69.1% 100%, 30.9% 100%); }
    .sector-4 { clip-path: polygon(50% 50%, 30.9% 100%, 0% 100%, 0% 30.9%, 20.6% 50%); }
    .sector-5 { clip-path: polygon(50% 50%, 20.6% 50%, 0% 30.9%, 0% 0%, 50% 0%); }

    /* Sector Dividers */
    .sector-dividers {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .divider {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(168, 85, 247, 0.3) 50%,
        transparent 100%
      );
      transform-origin: left center;
    }

    .divider-1 { transform: rotate(0deg); }
    .divider-2 { transform: rotate(72deg); }
    .divider-3 { transform: rotate(144deg); }
    .divider-4 { transform: rotate(216deg); }
    .divider-5 { transform: rotate(288deg); }

    /* Inner Shadow */
    .wheel-inner-shadow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 50%,
        transparent 30%,
        rgba(0, 0, 0, 0.2) 60%,
        rgba(0, 0, 0, 0.5) 100%
      );
      z-index: 6;
    }

    /* Central Sphere Container */
    .central-sphere-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--sphere-size);
      height: var(--sphere-size);
      z-index: 20;
    }

    /* Sphere Glow */
    .sphere-glow {
      position: absolute;
      inset: -50%;
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 50%,
        var(--glow-purple) 0%,
        var(--glow-blue) 40%,
        transparent 70%
      );
      filter: blur(30px);
      opacity: 0.7;
      animation: sphereGlowPulse 4s ease-in-out infinite;
    }

    @keyframes sphereGlowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }

    /* Sphere Bloom */
    .sphere-bloom {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 50%,
        rgba(255, 255, 255, 0.15) 0%,
        transparent 60%
      );
      filter: blur(15px);
      animation: bloomPulse 3s ease-in-out infinite;
    }

    @keyframes bloomPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }

    /* Main Sphere */
    .central-sphere {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.1),
        0 10px 40px -10px rgba(0, 0, 0, 0.8),
        inset 0 -10px 30px rgba(0, 0, 0, 0.5);
      animation: spherePulse 4s ease-in-out infinite;
    }

    @keyframes spherePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .central-sphere img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.8) saturate(1.2);
    }

    /* Sphere Highlight */
    .sphere-highlight {
      position: absolute;
      top: 10%;
      left: 15%;
      width: 35%;
      height: 35%;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at 50% 50%,
        rgba(255, 255, 255, 0.25) 0%,
        transparent 70%
      );
      filter: blur(8px);
    }

    /* Sphere Reflection */
    .sphere-reflection {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.1) 0%,
        transparent 50%,
        rgba(0, 0, 0, 0.2) 100%
      );
    }

    /* Orbital Rings */
    .orbital-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(168, 85, 247, 0.15);
      transform-style: preserve-3d;
    }

    .ring-inner {
      width: calc(var(--sphere-size) * 1.8);
      height: calc(var(--sphere-size) * 1.8);
      transform: translate(-50%, -50%) rotateX(75deg);
      animation: orbitSpin 20s linear infinite;
    }

    .ring-outer {
      width: calc(var(--sphere-size) * 2.4);
      height: calc(var(--sphere-size) * 2.4);
      transform: translate(-50%, -50%) rotateX(75deg);
      animation: orbitSpin 30s linear infinite reverse;
      opacity: 0.5;
    }

    @keyframes orbitSpin {
      from { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(0deg); }
      to { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(360deg); }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .deeptech-wheel-wrapper,
      .wheel-outer-glow,
      .central-sphere,
      .sphere-glow,
      .sphere-bloom,
      .orbital-ring,
      .star {
        animation: none;
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .deeptech-wheel-wrapper {
        animation: none;
        transform: rotateX(5deg);
      }
      .starfield { display: none; }
    }
  </style>
</head>
<body>
  <div class="deeptech-wheel-container">
    <!-- Starfield -->
    <div class="starfield">
      <!-- Stars generated via inline styles for fallback -->
      <span class="star" style="left: 10%; top: 20%; animation-delay: 0s;"></span>
      <span class="star" style="left: 85%; top: 15%; animation-delay: 0.5s;"></span>
      <span class="star" style="left: 25%; top: 80%; animation-delay: 1s;"></span>
      <span class="star" style="left: 70%; top: 60%; animation-delay: 1.5s;"></span>
      <span class="star" style="left: 45%; top: 10%; animation-delay: 2s;"></span>
      <span class="star" style="left: 90%; top: 45%; animation-delay: 2.5s;"></span>
      <span class="star" style="left: 5%; top: 55%; animation-delay: 3s;"></span>
      <span class="star" style="left: 60%; top: 90%; animation-delay: 0.3s;"></span>
      <span class="star" style="left: 35%; top: 40%; animation-delay: 0.8s;"></span>
      <span class="star" style="left: 15%; top: 95%; animation-delay: 1.3s;"></span>
    </div>

    <!-- Main Wheel Wrapper -->
    <div class="deeptech-wheel-wrapper">
      <!-- Outer Glow -->
      <div class="wheel-outer-glow"></div>

      <!-- Edge Feather -->
      <div class="wheel-edge-feather"></div>

      <!-- Main Wheel -->
      <div class="deeptech-wheel">
        <!-- Sector 1: Life -->
        <div class="wheel-sector sector-1">
          <div class="sector-image-wrapper">
            <img src="https://images.unsplash.com/photo-1628595351029-c2bf17511435?w=800&h=800&fit=crop" alt="Life">
          </div>
        </div>

        <!-- Sector 2: Matter -->
        <div class="wheel-sector sector-2">
          <div class="sector-image-wrapper">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&h=800&fit=crop" alt="Matter">
          </div>
        </div>

        <!-- Sector 3: Motion -->
        <div class="wheel-sector sector-3">
          <div class="sector-image-wrapper">
            <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800&h=800&fit=crop" alt="Motion">
          </div>
        </div>

        <!-- Sector 4: Intelligence -->
        <div class="wheel-sector sector-4">
          <div class="sector-image-wrapper">
            <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&h=800&fit=crop" alt="Intelligence">
          </div>
        </div>

        <!-- Sector 5: Energy -->
        <div class="wheel-sector sector-5">
          <div class="sector-image-wrapper">
            <img src="https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=800&h=800&fit=crop" alt="Energy">
          </div>
        </div>

        <!-- Dividers -->
        <div class="sector-dividers">
          <span class="divider divider-1"></span>
          <span class="divider divider-2"></span>
          <span class="divider divider-3"></span>
          <span class="divider divider-4"></span>
          <span class="divider divider-5"></span>
        </div>

        <!-- Inner Shadow -->
        <div class="wheel-inner-shadow"></div>
      </div>

      <!-- Central Sphere -->
      <div class="central-sphere-container">
        <div class="sphere-glow"></div>
        <div class="sphere-bloom"></div>
        <div class="central-sphere">
          <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400&h=400&fit=crop" alt="Central">
          <div class="sphere-highlight"></div>
          <div class="sphere-reflection"></div>
        </div>
      </div>

      <!-- Orbital Rings -->
      <div class="orbital-ring ring-inner"></div>
      <div class="orbital-ring ring-outer"></div>
    </div>
  </div>
</body>
</html>
